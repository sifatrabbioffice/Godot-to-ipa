name: "Godot iOS Unsigned Build"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  ios-unsigned-export:
    runs-on: macos-latest

    steps:
      # ১. গিটহাব থেকে প্রজেক্ট সোর্স কোড চেকআউট করা
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # ২. গডট ইঞ্জিন এবং এক্সপোর্ট টেমপ্লেট ডাউনলোড ও সেটআপ করা
      - name: Setup Godot Engine & Templates
        run: |
          GODOT_VERSION="4.2.2"
          
          # Godot CLI ডাউনলোড
          curl -LO https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_macos.universal.zip
          unzip Godot_v${GODOT_VERSION}-stable_macos.universal.zip
          mv Godot.app /Applications/Godot.app
          
          # Export Templates ডাউনলোড
          curl -LO https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          mkdir -p ~/Library/Application\ Support/Godot/export_templates/${GODOT_VERSION}.stable
          unzip Godot_v${GODOT_VERSION}-stable_export_templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* ~/Library/Application\ Support/Godot/export_templates/${GODOT_VERSION}.stable/
          
          echo "Godot Setup Completed."

      # ৩. গডটকে ফাইল রাইট করার ফুল পারমিশন দেওয়া (Permission Error Fix)
      - name: Fix Directory Permissions
        run: |
          chmod -R 777 .
          mkdir -p .godot/editor
          chmod -R 777 .godot

      # ৪. ডাইনামিক iOS এক্সপোর্ট প্রিসেট তৈরি করা (Team ID & Identifier Missing Error Fix)
      - name: Generate Unsigned iOS Export Preset
        run: |
          cat <<EOF > export_presets.cfg
          [preset.0]
          name="iOS"
          platform="iOS"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/ios/MyGame.xcodeproj"
          encryption/encrypt_pck=false
          encryption/encrypt_directory=false
          
          [preset.0.options]
          architectures/arm64=true
          application/identifier="com.unknown.mygame"
          application/name="MyUnsignedGame"
          application/signature="????"
          application/short_version="1.0"
          application/version="1.0"
          
          # গডটের রিকোয়ারমেন্ট পূরণের জন্য ফেক টিম আইডি (যা আনসাইনড বিল্ডকে ব্লক করবে না)
          application/provisioning_profile_uuid_release=""
          application/code_sign_identity_release=""
          application/export_with_unrecognized_profiles=true
          user_team_id="0000000000" 
          EOF
          echo "Fixed iOS preset generated."

      # ৫. গডট প্রজেক্ট থেকে এক্সকোড প্রজেক্ট জেনারেট করা (Headless Mode)
      - name: Export Project to Xcode
        run: |
          mkdir -p build/ios
          /Applications/Godot.app/Contents/MacOS/Godot --headless --path . --export-release "iOS" build/ios/MyGame.xcodeproj

      # ৬. এক্সকোড ব্যবহার করে কোড সাইনিং ছাড়াই আর্কাইভ এবং .ipa তৈরি করা
      - name: Build Unsigned iOS App
        run: |
          cd build/ios
          
          # কোড সাইনিং স্কিপ করে প্রোজেক্ট আর্কাইভ করা
          xcodebuild archive \
            -project MyGame.xcodeproj \
            -scheme "MyGame" \
            -configuration Release \
            -archivePath MyGame.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER=""

          # আর্কাইভ থেকে Payload ফোল্ডার তৈরি করে আনসাইনড .ipa জেনারেট করা
          mkdir -p ../../output/Payload
          cp -r MyGame.xcarchive/Products/Applications/MyGame.app ../../output/Payload/
          cd ../../output
          zip -r MyUnsignedGame.ipa Payload
          rm -rf Payload

      # ৭. তৈরি হওয়া আনসাইনড .ipa ফাইলটি আর্টিফ্যাক্ট হিসেবে আপলোড করা
      - name: Upload Unsigned IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Godot-iOS-Unsigned-App
          path: output/MyUnsignedGame.ipa
